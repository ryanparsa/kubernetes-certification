name: CKA Lab 33

on:
  push:
    paths: ['cka/33/**', '.github/workflows/cka-lab-33.yml']
  pull_request:
    paths: ['cka/33/**', '.github/workflows/cka-lab-33.yml']

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: cka/33/assets/kind-config.yaml
          cluster_name: cka-lab

      - name: Apply solution
        run: bash cka/33/assets/fix.sh

      - name: Run checks
        run: bash cka/33/assets/check.sh

      - name: Tear down
        if: always()
        run: bash cka/33/assets/down.sh
