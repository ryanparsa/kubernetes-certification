name: CKA Lab 33

on:
  push:
    paths: ['cka/33/**', '.github/workflows/cka-lab-33.yml']
  pull_request:
    paths: ['cka/33/**', '.github/workflows/cka-lab-33.yml']

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: cka/33/assets/kind-config.yaml
          cluster_name: cka-lab-33

      - name: Seed environment
        run: |
          export KUBECONFIG="$HOME/.kube/config"
          bash cka/33/assets/seed.sh

      - name: Apply solution
        run: |
          export KUBECONFIG="$HOME/.kube/config"
          # Ensure lab directory exists for fix.sh
          mkdir -p cka/33/lab
          ln -s "$KUBECONFIG" cka/33/lab/kubeconfig.yaml
          bash cka/33/assets/fix.sh

      - name: Run checks
        run: |
          export KUBECONFIG="$HOME/.kube/config"
          bash cka/33/assets/check.sh

      - name: Tear down
        if: always()
        run: |
          # Cleanup will delete kind cluster by name
          bash cka/33/assets/cleanup.sh
