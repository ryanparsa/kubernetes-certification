name: CKAD Lab 32

on:
  push:
    paths: ['ckad/32/**', '.github/workflows/ckad-lab-32.yml']
  pull_request:
    paths: ['ckad/32/**', '.github/workflows/ckad-lab-32.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: ckad/32/assets/kind-config.yaml
          cluster_name: ckad-lab-32

      - name: Export kubeconfig
        run: |
          mkdir -p ckad/32/lab
          kind get kubeconfig --name ckad-lab-32 > ckad/32/lab/kubeconfig.yaml

      - name: Apply solution
        run: bash ckad/32/assets/fix.sh

      - name: Run checks
        run: bash ckad/32/assets/check.sh

      - name: Tear down
        if: always()
        run: bash ckad/32/assets/cleanup.sh
