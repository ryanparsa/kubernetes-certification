name: CKA Lab 9

on:
  push:
    paths: ['cka/9/**', '.github/workflows/cka-lab-9.yml']
  pull_request:
    paths: ['cka/9/**', '.github/workflows/cka-lab-9.yml']

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: cka/9/assets/kind-config.yaml
          cluster_name: cka-lab-9

      - name: Set up kubeconfig
        run: |
          kind get kubeconfig --name cka-lab-9 > cka/9/assets/kubeconfig.yaml

      - name: Apply solution
        run: bash cka/9/assets/fix.sh

      - name: Run checks
        run: bash cka/9/assets/check.sh

      - name: Tear down
        if: always()
        run: bash cka/9/assets/down.sh
