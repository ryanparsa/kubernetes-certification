name: CKAD Lab 89

on:
  push:
    paths: ['ckad/89/**', '.github/workflows/ckad-lab-89.yml']
  pull_request:
    paths: ['ckad/89/**', '.github/workflows/ckad-lab-89.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: ckad/89/assets/kind-config.yaml
          cluster_name: ckad-lab-89

      - name: Setup lab
        run: bash ckad/89/assets/setup.sh

      - name: Apply solution
        run: bash ckad/89/assets/fix.sh

      - name: Run checks
        run: bash ckad/89/assets/check.sh

      - name: Tear down
        if: always()
        run: bash ckad/89/assets/cleanup.sh
