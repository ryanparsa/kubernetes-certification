name: CKAD Lab 89

on:
  push:
    paths: ['ckad/89/**', '.github/workflows/ckad-lab-89.yml']
  pull_request:
    paths: ['ckad/89/**', '.github/workflows/ckad-lab-89.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create /opt/course/1
        run: |
          sudo mkdir -p /opt/course/1
          sudo chmod 777 /opt/course/1

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: ckad/89/assets/kind-config.yaml
          cluster_name: ckad-lab-89

      - name: Apply solution
        run: |
          export KUBECONFIG="$HOME/.kube/config"
          # Link the kind kubeconfig to where the scripts expect it
          mkdir -p ckad/89/assets
          cp "$KUBECONFIG" ckad/89/assets/kubeconfig.yaml
          bash ckad/89/assets/fix.sh

      - name: Run checks
        run: bash ckad/89/assets/check.sh

      - name: Tear down
        if: always()
        run: bash ckad/89/assets/cleanup.sh
