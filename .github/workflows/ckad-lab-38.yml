name: CKAD Lab 38

on:
  push:
    paths: ['ckad/38/**', '.github/workflows/ckad-lab-38.yml']
  pull_request:
    paths: ['ckad/38/**', '.github/workflows/ckad-lab-38.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: ckad/38/assets/kind-config.yaml
          cluster_name: ckad-lab-38

      - name: Setup environment
        run: |
          mkdir -p ckad/38/lab
          kind get kubeconfig --name ckad-lab-38 > ckad/38/lab/kubeconfig.yaml

      - name: Apply solution
        run: bash ckad/38/assets/fix.sh

      - name: Run checks
        run: bash ckad/38/assets/check.sh

      - name: Tear down
        if: always()
        run: bash ckad/38/assets/cleanup.sh
