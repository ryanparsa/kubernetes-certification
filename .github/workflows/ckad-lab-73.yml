name: CKAD Lab 73

on:
  push:
    paths: ['ckad/73/**', '.github/workflows/ckad-lab-73.yml']
  pull_request:
    paths: ['ckad/73/**', '.github/workflows/ckad-lab-73.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: ckad/73/assets/kind-config.yaml
          cluster_name: ckad-lab-73

      - name: Apply solution
        run: bash ckad/73/assets/fix.sh

      - name: Run checks
        run: bash ckad/73/assets/check.sh

      - name: Tear down
        if: always()
        run: bash ckad/73/assets/cleanup.sh
