name: CKAD Lab 88

on:
  push:
    paths: ['ckad/88/**', '.github/workflows/ckad-lab-88.yml']
  pull_request:
    paths: ['ckad/88/**', '.github/workflows/ckad-lab-88.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: ckad/88/assets/kind-config.yaml
          cluster_name: ckad-lab-88

      - name: Apply solution
        run: bash ckad/88/assets/fix.sh

      - name: Run checks
        run: bash ckad/88/assets/check.sh

      - name: Tear down
        if: always()
        run: bash ckad/88/assets/cleanup.sh
