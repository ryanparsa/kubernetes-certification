name: CKAD Lab 82

on:
  push:
    paths: ['ckad/82/**', '.github/workflows/ckad-lab-82.yml']
  pull_request:
    paths: ['ckad/82/**', '.github/workflows/ckad-lab-82.yml']

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: ckad/82/assets/kind-config.yaml
          cluster_name: ckad-lab-82

      - name: Apply solution
        run: bash ckad/82/assets/fix.sh

      - name: Run checks
        run: bash ckad/82/assets/check.sh

      - name: Tear down
        if: always()
        run: bash ckad/82/assets/cleanup.sh
