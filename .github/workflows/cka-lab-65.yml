name: CKA Lab 65

on:
  push:
    paths: ['cka/65/**', '.github/workflows/cka-lab-65.yml']
  pull_request:
    paths: ['cka/65/**', '.github/workflows/cka-lab-65.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: cka/65/assets/kind-config.yaml
          cluster_name: cka-lab-65

      - name: Apply solution
        run: bash cka/65/assets/fix.sh

      - name: Run checks
        run: bash cka/65/assets/check.sh

      - name: Tear down
        if: always()
        run: bash cka/65/assets/cleanup.sh
