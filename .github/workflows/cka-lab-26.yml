name: CKA Lab 26

on:
  push:
    paths: ['cka/26/**', '.github/workflows/cka-lab-26.yml']
  pull_request:
    paths: ['cka/26/**', '.github/workflows/cka-lab-26.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: cka/26/assets/kind-config.yaml
          cluster_name: cka-lab-26

      - name: Link kubeconfig
        run: |
          mkdir -p cka/26/assets
          ln -s -f ${HOME}/.kube/config cka/26/assets/kubeconfig.yaml

      - name: Apply solution
        run: bash cka/26/assets/fix.sh

      - name: Run checks
        run: bash cka/26/assets/check.sh

      - name: Tear down
        if: always()
        run: bash cka/26/assets/down.sh
