name: CKA Lab 72

on:
  push:
    paths: ['cka/72/**', '.github/workflows/cka-lab-72.yml']
  pull_request:
    paths: ['cka/72/**', '.github/workflows/cka-lab-72.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: cka/72/assets/kind-config.yaml
          cluster_name: cka-lab-72

      - name: Install metrics-server
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          kubectl patch deployment metrics-server -n kube-system --type='json' \
            -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'
          kubectl rollout status -n kube-system deployment/metrics-server --timeout=120s

      - name: Apply solution
        run: bash cka/72/assets/fix.sh

      - name: Run checks
        run: bash cka/72/assets/check.sh

      - name: Tear down
        if: always()
        run: bash cka/72/assets/cleanup.sh
