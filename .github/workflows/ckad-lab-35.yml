name: CKAD Lab 35

on:
  push:
    paths: ['ckad/35/**', '.github/workflows/ckad-lab-35.yml']
  pull_request:
    paths: ['ckad/35/**', '.github/workflows/ckad-lab-35.yml']

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: ckad/35/assets/kind-config.yaml
          cluster_name: ckad-lab-35

      - name: Set KUBECONFIG
        run: |
          kind get kubeconfig --name ckad-lab-35 > ckad/35/assets/kubeconfig.yaml

      - name: Apply solution
        run: bash ckad/35/assets/fix.sh

      - name: Run checks
        run: bash ckad/35/assets/check.sh

      - name: Tear down
        if: always()
        run: bash ckad/35/assets/cleanup.sh
