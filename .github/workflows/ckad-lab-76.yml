name: CKAD Lab 76

on:
  push:
    paths: ['ckad/76/**', '.github/workflows/ckad-lab-76.yml']
  pull_request:
    paths: ['ckad/76/**', '.github/workflows/ckad-lab-76.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: ckad/76/assets/kind-config.yaml
          cluster_name: ckad-lab-76

      - name: Seed environment
        run: bash ckad/76/assets/setup.sh

      - name: Apply solution
        run: bash ckad/76/assets/fix.sh

      - name: Run checks
        run: bash ckad/76/assets/check.sh

      - name: Tear down
        if: always()
        run: bash ckad/76/assets/cleanup.sh
