name: CKA Lab 28

on:
  push:
    paths: ['cka/28/**', '.github/workflows/cka-lab-28.yml']
  pull_request:
    paths: ['cka/28/**', '.github/workflows/cka-lab-28.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: cka/28/assets/kind-config.yaml
          cluster_name: cka-lab-28

      - name: Apply solution
        run: bash cka/28/assets/fix.sh

      - name: Run checks
        run: bash cka/28/assets/check.sh

      - name: Tear down
        if: always()
        run: bash cka/28/assets/cleanup.sh
