name: CKA Lab 70

on:
  push:
    paths: ['cka/70/**', '.github/workflows/cka-lab-70.yml']
  pull_request:
    paths: ['cka/70/**', '.github/workflows/cka-lab-70.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: cka/70/assets/kind-config.yaml
          cluster_name: cka-lab-70

      - name: Apply solution
        run: bash cka/70/assets/fix.sh

      - name: Run checks
        run: bash cka/70/assets/check.sh

      - name: Tear down
        if: always()
        run: bash cka/70/assets/cleanup.sh
