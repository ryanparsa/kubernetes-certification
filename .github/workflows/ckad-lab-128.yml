name: CKAD Lab 128

on:
  push:
    paths: ['ckad/128/**', '.github/workflows/ckad-lab-128.yml']
  pull_request:
    paths: ['ckad/128/**', '.github/workflows/ckad-lab-128.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: ckad/128/assets/kind-config.yaml
          cluster_name: ckad-lab-128

      - name: Apply solution
        run: bash ckad/128/assets/fix.sh

      - name: Run checks
        run: bash ckad/128/assets/check.sh

      - name: Tear down
        if: always()
        run: bash ckad/128/assets/cleanup.sh
