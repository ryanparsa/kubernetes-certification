name: CKA Lab 36

on:
  push:
    paths: ['cka/36/**', '.github/workflows/cka-lab-36.yml']
  pull_request:
    paths: ['cka/36/**', '.github/workflows/cka-lab-36.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: cka/36/assets/kind-config.yaml
          cluster_name: cka-lab-36
          kubeconfig: cka/36/assets/kubeconfig.yaml

      - name: Apply solution
        run: bash cka/36/assets/fix.sh

      - name: Run checks
        run: bash cka/36/assets/check.sh

      - name: Tear down
        if: always()
        run: bash cka/36/assets/down.sh
