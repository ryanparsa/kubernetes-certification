name: CKA Lab 19

on:
  push:
    paths: ['cka/19/**', '.github/workflows/cka-lab-19.yml']
  pull_request:
    paths: ['cka/19/**', '.github/workflows/cka-lab-19.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: cka/19/assets/kind-config.yaml
          cluster_name: cka-lab-19

      - name: Apply solution
        run: |
          export KUBECONFIG="${{ github.workspace }}/cka/19/assets/kubeconfig.yaml"
          # The kind-action creates a kubeconfig, but our fix.sh expects one at a specific path.
          # We'll copy the action's kubeconfig to our expected path.
          cp ~/.kube/config "$KUBECONFIG"
          bash cka/19/assets/fix.sh

      - name: Run checks
        run: |
          export KUBECONFIG="${{ github.workspace }}/cka/19/assets/kubeconfig.yaml"
          bash cka/19/assets/check.sh

      - name: Tear down
        if: always()
        run: bash cka/19/assets/down.sh
