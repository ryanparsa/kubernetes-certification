name: CKA Lab 12

on:
  push:
    paths: ['cka/12/**', '.github/workflows/cka-lab-12.yml']
  pull_request:
    paths: ['cka/12/**', '.github/workflows/cka-lab-12.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: cka/12/assets/kind-config.yaml
          cluster_name: cka-lab-12

      - name: Apply solution
        run: bash cka/12/assets/fix.sh

      - name: Run checks
        run: bash cka/12/assets/check.sh

      - name: Tear down
        if: always()
        run: bash cka/12/assets/down.sh
