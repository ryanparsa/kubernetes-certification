name: CKA Lab 30

on:
  push:
    paths: ['cka/30/**', '.github/workflows/cka-lab-30.yml']
  pull_request:
    paths: ['cka/30/**', '.github/workflows/cka-lab-30.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: cka/30/assets/kind-config.yaml
          cluster_name: cka-lab-30

      - name: Export kubeconfig
        run: kind get kubeconfig --name cka-lab-30 > cka/30/assets/kubeconfig.yaml

      - name: Apply solution
        run: bash cka/30/assets/fix.sh

      - name: Run checks
        run: bash cka/30/assets/check.sh

      - name: Tear down
        if: always()
        run: bash cka/30/assets/down.sh
