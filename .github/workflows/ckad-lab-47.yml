name: CKAD Lab 47

on:
  push:
    paths: ['ckad/47/**', '.github/workflows/ckad-lab-47.yml']
  pull_request:
    paths: ['ckad/47/**', '.github/workflows/ckad-lab-47.yml']

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: ckad/47/assets/kind-config.yaml
          cluster_name: ckad-lab-47

      - name: Export KUBECONFIG
        run: |
          kind get kubeconfig --name ckad-lab-47 > ckad/47/assets/kubeconfig.yaml
          echo "KUBECONFIG=$(pwd)/ckad/47/assets/kubeconfig.yaml" >> $GITHUB_ENV

      - name: Apply solution
        run: bash ckad/47/assets/fix.sh

      - name: Run checks
        run: bash ckad/47/assets/check.sh

      - name: Tear down
        if: always()
        run: bash ckad/47/assets/cleanup.sh
