name: CKAD Lab 74

on:
  push:
    paths: ['ckad/74/**', '.github/workflows/ckad-lab-74.yml']
  pull_request:
    paths: ['ckad/74/**', '.github/workflows/ckad-lab-74.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: ckad/74/assets/kind-config.yaml
          cluster_name: ckad-lab-74

      - name: Apply solution
        run: bash ckad/74/assets/fix.sh

      - name: Run checks
        run: bash ckad/74/assets/check.sh

      - name: Tear down
        if: always()
        run: bash ckad/74/assets/cleanup.sh
