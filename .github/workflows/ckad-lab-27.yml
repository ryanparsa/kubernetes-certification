name: CKAD Lab 27

on:
  push:
    paths: ['ckad/27/**', '.github/workflows/ckad-lab-27.yml']
  pull_request:
    paths: ['ckad/27/**', '.github/workflows/ckad-lab-27.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: ckad/27/assets/kind-config.yaml
          cluster_name: ckad-lab-27

      - name: Apply solution
        run: bash ckad/27/assets/fix.sh

      - name: Run checks
        run: bash ckad/27/assets/check.sh

      - name: Tear down
        if: always()
        run: bash ckad/27/assets/cleanup.sh
