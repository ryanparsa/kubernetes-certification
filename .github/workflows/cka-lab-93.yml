name: CKA Lab 93

on:
  push:
    paths: ['cka/93/**', '.github/workflows/cka-lab-93.yml']
  pull_request:
    paths: ['cka/93/**', '.github/workflows/cka-lab-93.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: cka/93/assets/kind-config.yaml
          cluster_name: cka-lab-93

      - name: Apply solution
        run: bash cka/93/assets/fix.sh

      - name: Run checks
        run: bash cka/93/assets/check.sh

      - name: Tear down
        if: always()
        run: bash cka/93/assets/cleanup.sh
