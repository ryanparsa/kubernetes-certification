name: CKA Lab 10

on:
  push:
    paths: ['cka/10/**', '.github/workflows/cka-lab-10.yml']
  pull_request:
    paths: ['cka/10/**', '.github/workflows/cka-lab-10.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: cka/10/assets/kind-config.yaml
          cluster_name: cka-lab-10

      - name: Setup environment
        run: |
          kind get kubeconfig --name cka-lab-10 > cka/10/assets/kubeconfig.yaml
          bash cka/10/assets/up.sh

      - name: Apply solution
        run: bash cka/10/assets/fix.sh

      - name: Run checks
        run: bash cka/10/assets/check.sh

      - name: Tear down
        if: always()
        run: bash cka/10/assets/down.sh
