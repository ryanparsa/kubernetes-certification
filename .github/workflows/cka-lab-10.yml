name: CKA Lab 10

on:
  push:
    paths:
      - 'cka/10/**'
      - '.github/workflows/cka-lab-10.yml'
  pull_request:
    paths:
      - 'cka/10/**'
      - '.github/workflows/cka-lab-10.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Start lab cluster
        run: bash cka/10/assets/up.sh

      - name: Apply solution
        run: bash cka/10/assets/fix.sh

      - name: Run checks
        run: bash cka/10/assets/check.sh

      - name: Tear down
        if: always()
        run: bash cka/10/assets/down.sh
