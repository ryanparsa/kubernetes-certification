name: CKAD Lab 42

on:
  push:
    paths: ['ckad/42/**', '.github/workflows/ckad-lab-42.yml']
  pull_request:
    paths: ['ckad/42/**', '.github/workflows/ckad-lab-42.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: ckad/42/assets/kind-config.yaml
          cluster_name: ckad-lab-42

      - name: Apply solution
        run: bash ckad/42/assets/fix.sh

      - name: Run checks
        run: bash ckad/42/assets/check.sh

      - name: Tear down
        if: always()
        run: bash ckad/42/assets/cleanup.sh
