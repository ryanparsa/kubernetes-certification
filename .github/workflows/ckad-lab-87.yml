name: CKAD Lab 87

on:
  push:
    paths: ['ckad/87/**', '.github/workflows/ckad-lab-87.yml']
  pull_request:
    paths: ['ckad/87/**', '.github/workflows/ckad-lab-87.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: ckad/87/assets/kind-config.yaml
          cluster_name: ckad-lab-87

      - name: Apply solution
        run: bash ckad/87/assets/fix.sh

      - name: Run checks
        run: bash ckad/87/assets/check.sh

      - name: Tear down
        if: always()
        run: bash ckad/87/assets/cleanup.sh
