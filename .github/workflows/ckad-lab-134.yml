name: CKAD Lab 134

on:
  push:
    paths: ['ckad/134/**', '.github/workflows/ckad-lab-134.yml']
  pull_request:
    paths: ['ckad/134/**', '.github/workflows/ckad-lab-134.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create cluster
        uses: helm/kind-action@v1
        with:
          config: ckad/134/assets/kind-config.yaml
          cluster_name: ckad-lab-134

      - name: Setup environment
        run: bash ckad/134/assets/setup.sh

      - name: Apply solution
        run: bash ckad/134/assets/fix.sh

      - name: Run checks
        run: bash ckad/134/assets/check.sh

      - name: Tear down
        if: always()
        run: bash ckad/134/assets/cleanup.sh
