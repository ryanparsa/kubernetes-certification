apiVersion: v1
kind: Namespace
metadata:
  name: api-gateway-staging
---
apiVersion: v1
kind: Namespace
metadata:
  name: api-gateway-prod
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-autoscaler
  namespace: api-gateway-staging
data:
  config: "maxReplicas: 5"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-autoscaler
  namespace: api-gateway-prod
data:
  config: "maxReplicas: 5"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: api-gateway-staging
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        resources:
          requests:
            cpu: 100m
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: api-gateway-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        resources:
          requests:
            cpu: 100m
