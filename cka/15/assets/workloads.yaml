apiVersion: v1
kind: Namespace
metadata:
  name: project-snake
---
# backend StatefulSet — label: app=backend
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: project-snake
spec:
  clusterIP: None
  selector:
    app: backend
  ports:
  - port: 80
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: backend
  namespace: project-snake
spec:
  serviceName: backend
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
# db1 StatefulSet — label: app=db1, listens on port 1111
apiVersion: v1
kind: Service
metadata:
  name: db1
  namespace: project-snake
spec:
  clusterIP: None
  selector:
    app: db1
  ports:
  - port: 1111
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db1
  namespace: project-snake
spec:
  serviceName: db1
  replicas: 1
  selector:
    matchLabels:
      app: db1
  template:
    metadata:
      labels:
        app: db1
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo 'server { listen 1111; location / { return 200 "database one\n"; add_header Content-Type text/plain; } }' \
            > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'
        ports:
        - containerPort: 1111
---
