apiVersion: v1
kind: Namespace
metadata:
  name: project-tiger
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tigers-for-rent-web
  namespace: project-tiger
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tigers-for-rent-web
  template:
    metadata:
      labels:
        app: tigers-for-rent-web
    spec:
      containers:
      - name: web
        image: nginx:alpine
