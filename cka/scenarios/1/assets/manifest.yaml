apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashy
  namespace: troubleshoot
spec:
  replicas: 3
  selector:
    matchLabels: { app: crashy }
  template:
    metadata:
      labels: { app: crashy }
    spec:
      containers:
      - name: app
        image: busybox:1.36
        command: ["sh","-c","echo starting; exit 7"]
