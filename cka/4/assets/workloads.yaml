apiVersion: v1
kind: Namespace
metadata:
  name: project-c13
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: c13-2x3-api
  namespace: project-c13
spec:
  replicas: 3
  selector:
    matchLabels:
      app: c13-2x3-api
  template:
    metadata:
      labels:
        app: c13-2x3-api
    spec:
      containers:
      - name: app
        image: nginx:alpine
        resources:
          requests:
            cpu: 50m
            memory: 20Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: c13-2x3-web
  namespace: project-c13
spec:
  replicas: 6
  selector:
    matchLabels:
      app: c13-2x3-web
  template:
    metadata:
      labels:
        app: c13-2x3-web
    spec:
      containers:
      - name: app
        image: nginx:alpine
        resources:
          requests:
            cpu: 50m
            memory: 10Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: c13-3cc-data
  namespace: project-c13
spec:
  replicas: 3
  selector:
    matchLabels:
      app: c13-3cc-data
  template:
    metadata:
      labels:
        app: c13-3cc-data
    spec:
      containers:
      - name: app
        image: nginx:alpine
        resources:
          requests:
            cpu: 30m
            memory: 10Mi
---
# No resource requests or limits - QoS class will be BestEffort (terminated first)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: c13-3cc-runner-heavy
  namespace: project-c13
spec:
  replicas: 3
  selector:
    matchLabels:
      app: c13-3cc-runner-heavy
  template:
    metadata:
      labels:
        app: c13-3cc-runner-heavy
    spec:
      containers:
      - name: app
        image: nginx:alpine
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: c13-3cc-web
  namespace: project-c13
spec:
  replicas: 4
  selector:
    matchLabels:
      app: c13-3cc-web
  template:
    metadata:
      labels:
        app: c13-3cc-web
    spec:
      containers:
      - name: app
        image: nginx:alpine
        resources:
          requests:
            cpu: 50m
            memory: 10Mi
